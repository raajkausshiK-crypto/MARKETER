<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Options Screener</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    @keyframes flashGreen { 0% { background-color: rgba(34,197,94,.35); } 100% { background-color: transparent; } }
    @keyframes flashRed   { 0% { background-color: rgba(239,68,68,.35); } 100% { background-color: transparent; } }
    .flash-up   { animation: flashGreen .5s ease-out; }
    .flash-down { animation: flashRed   .5s ease-out; }
    @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:.3;} }
    .dot-pulse { animation: pulse-dot 1.4s infinite; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn .25s ease-out; }
    .card-glow:hover { box-shadow: 0 0 0 2px rgba(99,102,241,.5); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body class="dark bg-slate-950 text-slate-200 min-h-screen font-sans">

<div id="app" class="max-w-7xl mx-auto px-4 py-5">

  <!-- ===== TOP BAR ===== -->
  <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6">
    <div>
      <h1 class="text-2xl font-extrabold text-white tracking-tight">Market Screener</h1>
      <p class="text-xs text-slate-500 mt-0.5">Real-time NSE options chain &middot; monitor multiple stocks</p>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2 text-sm">
        <span id="statusDot" class="w-2.5 h-2.5 rounded-full bg-slate-600"></span>
        <span id="statusText" class="text-slate-500 text-xs">Offline</span>
      </div>
      <button id="connectBtn" onclick="toggleConnection()"
        class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow transition">
        Start Live Data
      </button>
    </div>
  </header>

  <!-- ===== ADD STOCKS BAR ===== -->
  <section class="bg-slate-900 border border-slate-800 rounded-xl p-4 mb-5">
    <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-end">
      <div class="flex-1 w-full">
        <label class="block text-[11px] uppercase tracking-wider text-slate-500 mb-1.5 font-medium">Add Stock / Index</label>
        <div class="flex gap-2">
          <input id="searchInput" type="text" placeholder="Type symbol e.g. RELIANCE, NIFTY..."
            class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm uppercase
                   focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/50 transition placeholder:text-slate-600">
          <button onclick="addWatchlistItem()"
            class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-lg text-sm font-semibold shadow transition whitespace-nowrap">
            + Add
          </button>
        </div>
      </div>
    </div>
    <!-- Quick-add chips -->
    <div class="flex flex-wrap gap-2 mt-3">
      <span class="text-[11px] text-slate-600 uppercase tracking-wider self-center mr-1">Quick add:</span>
      <button onclick="addWatchlistItem('NIFTY')"     class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">NIFTY</button>
      <button onclick="addWatchlistItem('BANKNIFTY')"  class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">BANKNIFTY</button>
      <button onclick="addWatchlistItem('FINNIFTY')"   class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">FINNIFTY</button>
      <button onclick="addWatchlistItem('RELIANCE')"   class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">RELIANCE</button>
      <button onclick="addWatchlistItem('TCS')"        class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">TCS</button>
      <button onclick="addWatchlistItem('INFY')"       class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">INFY</button>
      <button onclick="addWatchlistItem('HDFCBANK')"   class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">HDFCBANK</button>
      <button onclick="addWatchlistItem('SBIN')"       class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">SBIN</button>
      <button onclick="addWatchlistItem('TATAMOTORS')" class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">TATAMOTORS</button>
      <button onclick="addWatchlistItem('ITC')"        class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">ITC</button>
      <button onclick="addWatchlistItem('ZOMATO')"     class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">ZOMATO</button>
      <button onclick="addWatchlistItem('CIPLA')"      class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">CIPLA</button>
      <button onclick="addWatchlistItem('MIDCPNIFTY')" class="qchip bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white text-xs font-medium px-3 py-1.5 rounded-full border border-slate-700 hover:border-slate-500 transition cursor-pointer">MIDCPNIFTY</button>
    </div>
  </section>

  <div id="toastArea" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- ===== WATCHLIST CARDS ===== -->
  <section id="watchlistCards" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 mb-6">
    <!-- cards injected -->
  </section>

  <!-- ===== SELECTED STOCK DETAIL ===== -->
  <section id="detailPanel" class="hidden fade-in">
    <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
      <!-- Detail Header -->
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 p-4 border-b border-slate-800">
        <div class="flex items-center gap-4">
          <div>
            <div class="text-[11px] uppercase tracking-wider text-slate-500">Option Chain</div>
            <div class="flex items-baseline gap-3">
              <span id="detailSymbol" class="text-2xl font-bold text-white">—</span>
              <span id="detailSpot" class="text-lg font-semibold text-slate-300 tabular-nums">—</span>
              <span id="detailChange" class="text-sm font-medium px-2 py-0.5 rounded hidden">—</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          <select id="expirySelect" onchange="changeExpiry()"
            class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 transition">
            <option value="">Expiry</option>
          </select>
          <div class="flex gap-1.5">
            <input id="customStrikeInput" type="number" placeholder="Strike..."
              class="w-28 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 transition">
            <button onclick="addCustomStrike()"
              class="bg-slate-700 hover:bg-slate-600 text-sm px-3 py-2 rounded-lg font-medium transition">Add</button>
            <button onclick="resetCustomStrikes()"
              class="text-rose-400 hover:bg-rose-500/10 text-sm px-3 py-2 rounded-lg font-medium transition border border-transparent hover:border-rose-500/30">Reset</button>
          </div>
        </div>
      </div>

      <!-- Chain Table -->
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-950/60 text-[11px] uppercase tracking-wider">
              <th colspan="5" class="py-2.5 text-center text-emerald-400 font-semibold border-b border-slate-800">Calls</th>
              <th class="py-2.5 text-center text-slate-400 font-semibold border-b border-slate-800 border-x border-slate-700 bg-slate-950/80">Strike</th>
              <th colspan="5" class="py-2.5 text-center text-rose-400 font-semibold border-b border-slate-800">Puts</th>
            </tr>
            <tr class="bg-slate-950/40 text-[10px] uppercase tracking-wider text-slate-600">
              <th class="py-2 px-2 text-left font-medium">Status</th>
              <th class="py-2 px-2 text-right font-medium">OI</th>
              <th class="py-2 px-2 text-right font-medium">IV</th>
              <th class="py-2 px-2 text-right font-medium">Bid/Ask</th>
              <th class="py-2 px-2 text-right font-medium text-emerald-500">LTP</th>
              <th class="py-2 px-2 text-center font-medium border-x border-slate-700 bg-slate-950/80">Price</th>
              <th class="py-2 px-2 text-left font-medium text-rose-500">LTP</th>
              <th class="py-2 px-2 text-left font-medium">Bid/Ask</th>
              <th class="py-2 px-2 text-left font-medium">IV</th>
              <th class="py-2 px-2 text-left font-medium">OI</th>
              <th class="py-2 px-2 text-right font-medium">Status</th>
            </tr>
          </thead>
          <tbody id="chainBody"></tbody>
        </table>
      </div>

      <!-- Cash-only / info banner -->
      <div id="chainInfo" class="hidden px-4 py-2.5 text-xs border-t border-slate-800"></div>
    </div>
  </section>

  <!-- ===== EMPTY STATE ===== -->
  <section id="emptyState" class="text-center py-16">
    <div class="text-slate-700 text-6xl mb-4">&#9881;</div>
    <p class="text-slate-500 text-sm">Add stocks above to start monitoring</p>
    <p class="text-slate-600 text-xs mt-1">Click any quick-add chip or type a symbol</p>
  </section>
</div>

<script>
// ========================= STATE =========================
const IS_REMOTE = !['localhost','127.0.0.1',''].includes(location.hostname);

const watchlist = new Map();   // symbol -> { spot, expiry, expiries, rows, cashOnly, lastSpot, loading, error }
let selectedSymbol = null;
let customStrikes = [];
let pollTimers = {};
let ws = null;
let connected = false;

const fmt = v => Number(v||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtOI = v => {
  v = Number(v||0);
  if (v >= 1e7) return (v/1e7).toFixed(2)+'Cr';
  if (v >= 1e5) return (v/1e5).toFixed(2)+'L';
  if (v >= 1e3) return (v/1e3).toFixed(1)+'K';
  return String(Math.round(v));
};

// ========================= TOAST =========================
function toast(msg, type='info') {
  const el = document.createElement('div');
  const colors = { info:'bg-indigo-600', success:'bg-emerald-600', error:'bg-rose-600', warn:'bg-amber-600' };
  el.className = `${colors[type]||colors.info} text-white text-sm px-4 py-2.5 rounded-lg shadow-lg fade-in`;
  el.textContent = msg;
  document.getElementById('toastArea').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3000);
}

// ========================= WATCHLIST MANAGEMENT =========================
function addWatchlistItem(sym) {
  sym = (sym || document.getElementById('searchInput').value || '').toUpperCase().trim();
  document.getElementById('searchInput').value = '';
  if (!sym) return;
  if (watchlist.has(sym)) {
    selectSymbol(sym);
    return;
  }

  watchlist.set(sym, { spot:0, expiry:null, expiries:[], rows:[], cashOnly:false, lastSpot:0, loading:true, error:null });
  renderCards();
  selectSymbol(sym);
  highlightChip(sym);

  if (connected || IS_REMOTE) fetchChain(sym);
  else toast(`${sym} added — start live data to fetch chain`, 'warn');
}

function removeWatchlistItem(sym, e) {
  e && e.stopPropagation();
  watchlist.delete(sym);
  if (pollTimers[sym]) { clearInterval(pollTimers[sym]); delete pollTimers[sym]; }
  if (selectedSymbol === sym) { selectedSymbol = null; hideDetail(); }
  renderCards();
  unhighlightChip(sym);
  if (!watchlist.size) document.getElementById('emptyState').classList.remove('hidden');
}

function selectSymbol(sym) {
  selectedSymbol = sym;
  customStrikes = [];
  renderCards();
  renderDetail();
}

// ========================= FETCH DATA =========================
async function fetchChain(sym, expiry) {
  const entry = watchlist.get(sym);
  if (!entry) return;
  entry.loading = true;
  entry.error = null;
  renderCards();

  try {
    const url = `/api/chain?symbol=${encodeURIComponent(sym)}` + (expiry ? `&expiry=${encodeURIComponent(expiry)}` : '');
    const res = await fetch(url, { cache:'no-store' });
    const data = await res.json();

    if (data.type === 'error') {
      entry.error = data.message || 'API error';
      entry.loading = false;
      renderCards();
      if (selectedSymbol === sym) renderDetail();
      return;
    }
    if (data.type === 'chain') {
      entry.lastSpot = entry.spot || data.spot;
      entry.spot = data.spot || 0;
      entry.expiry = data.expiry || null;
      entry.expiries = data.expiries || [];
      entry.rows = data.rows || [];
      entry.cashOnly = !!data.cash_only;
      entry.loading = false;
      entry.error = null;
      renderCards();
      if (selectedSymbol === sym) renderDetail();
    }
  } catch (e) {
    entry.error = 'Network error';
    entry.loading = false;
    renderCards();
    if (selectedSymbol === sym) renderDetail();
  }
}

// ========================= POLLING =========================
function startAllPolling() {
  watchlist.forEach((_, sym) => startPolling(sym));
}
function stopAllPolling() {
  Object.keys(pollTimers).forEach(sym => { clearInterval(pollTimers[sym]); delete pollTimers[sym]; });
}
function startPolling(sym) {
  if (pollTimers[sym]) return;
  fetchChain(sym, watchlist.get(sym)?.expiry);
  pollTimers[sym] = setInterval(() => {
    const entry = watchlist.get(sym);
    fetchChain(sym, entry?.expiry);
  }, 2000);
}

// ========================= CONNECTION =========================
function setConnStatus(kind) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const btn = document.getElementById('connectBtn');
  if (kind === 'live') {
    dot.className = 'w-2.5 h-2.5 rounded-full bg-emerald-500 dot-pulse';
    text.textContent = 'Live'; text.className = 'text-emerald-400 text-xs';
    btn.textContent = 'Disconnect'; btn.className = 'bg-rose-600 hover:bg-rose-500 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow transition';
  } else {
    dot.className = 'w-2.5 h-2.5 rounded-full bg-slate-600';
    text.textContent = 'Offline'; text.className = 'text-slate-500 text-xs';
    btn.textContent = 'Start Live Data'; btn.className = 'bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow transition';
  }
}

function toggleConnection() {
  if (connected) {
    connected = false;
    stopAllPolling();
    setConnStatus('offline');
  } else {
    connected = true;
    setConnStatus('live');
    startAllPolling();
    if (!watchlist.size) toast('Add stocks to start monitoring', 'info');
  }
}

// ========================= RENDER: WATCHLIST CARDS =========================
function renderCards() {
  const container = document.getElementById('watchlistCards');
  document.getElementById('emptyState').classList.toggle('hidden', watchlist.size > 0);

  if (!watchlist.size) { container.innerHTML = ''; return; }

  container.innerHTML = [...watchlist.entries()].map(([sym, d]) => {
    const isSelected = sym === selectedSymbol;
    const change = d.lastSpot && d.spot ? d.spot - d.lastSpot : 0;
    const changePct = d.lastSpot ? ((change / d.lastSpot) * 100) : 0;
    const up = change >= 0;

    const maxCallOI = d.rows.length ? Math.max(...d.rows.map(r => r.call?.oi || 0)) : 0;
    const maxPutOI  = d.rows.length ? Math.max(...d.rows.map(r => r.put?.oi || 0)) : 0;

    return `
      <div onclick="selectSymbol('${sym}')"
        class="relative bg-slate-900 border rounded-xl p-3.5 cursor-pointer transition-all card-glow fade-in
               ${isSelected ? 'border-indigo-500 ring-1 ring-indigo-500/30' : 'border-slate-800 hover:border-slate-600'}">
        <button onclick="removeWatchlistItem('${sym}', event)"
          class="absolute top-2 right-2 text-slate-600 hover:text-rose-400 text-xs transition" title="Remove">&#10005;</button>
        <div class="text-xs text-slate-500 font-medium uppercase tracking-wider">${d.cashOnly ? 'CASH' : 'F&O'}</div>
        <div class="text-base font-bold text-white mt-0.5">${sym}</div>
        ${d.loading ? '<div class="text-xs text-slate-600 mt-1">Loading...</div>' :
          d.error ? `<div class="text-xs text-rose-400 mt-1 truncate" title="${d.error}">Error</div>` : `
          <div class="text-lg font-bold tabular-nums mt-1 ${up ? 'text-emerald-400' : 'text-rose-400'}">${fmt(d.spot)}</div>
          <div class="text-[11px] tabular-nums ${up ? 'text-emerald-500' : 'text-rose-500'}">
            ${up?'+':''}${fmt(change)} (${up?'+':''}${changePct.toFixed(2)}%)
          </div>
          ${d.rows.length ? `
          <div class="flex gap-2 mt-2 text-[10px] text-slate-500">
            <span title="Max Call OI">C: ${fmtOI(maxCallOI)}</span>
            <span title="Max Put OI">P: ${fmtOI(maxPutOI)}</span>
            <span title="Total strikes">${d.rows.length} stk</span>
          </div>` : ''}
        `}
      </div>`;
  }).join('');
}

// ========================= RENDER: DETAIL PANEL =========================
function hideDetail() {
  document.getElementById('detailPanel').classList.add('hidden');
}

function renderDetail() {
  const panel = document.getElementById('detailPanel');
  if (!selectedSymbol || !watchlist.has(selectedSymbol)) { hideDetail(); return; }

  panel.classList.remove('hidden');
  const d = watchlist.get(selectedSymbol);
  const spot = d.spot || 0;

  document.getElementById('detailSymbol').textContent = selectedSymbol;
  const spotEl = document.getElementById('detailSpot');
  spotEl.textContent = spot ? fmt(spot) : '—';

  // Expiry dropdown
  const sel = document.getElementById('expirySelect');
  sel.innerHTML = d.expiries.length
    ? d.expiries.map(e => `<option value="${e}" ${e===d.expiry?'selected':''}>${e}</option>`).join('')
    : '<option value="">No expiries</option>';

  // Info banner
  const info = document.getElementById('chainInfo');
  if (d.error) {
    info.textContent = d.error;
    info.className = 'px-4 py-2.5 text-xs border-t border-slate-800 text-rose-400 bg-rose-500/5 block';
  } else if (d.cashOnly) {
    info.textContent = `${selectedSymbol} has no listed options — showing spot price with intrinsic-value grid.`;
    info.className = 'px-4 py-2.5 text-xs border-t border-slate-800 text-amber-400 bg-amber-500/5 block';
  } else {
    info.className = 'hidden';
  }

  renderChainTable(d, spot);
}

function renderChainTable(d, spot) {
  const body = document.getElementById('chainBody');

  // Merge custom strikes
  const byStrike = new Map();
  (d.rows || []).forEach(r => byStrike.set(Number(r.strike), r));
  customStrikes.forEach(s => {
    if (!byStrike.has(s)) {
      byStrike.set(s, {
        strike: s, custom: true,
        call: { ltp: Math.max(0, spot-s), oi:0, iv:0, bid:0, ask:0 },
        put:  { ltp: Math.max(0, s-spot), oi:0, iv:0, bid:0, ask:0 },
      });
    }
  });

  const rows = [...byStrike.values()].sort((a,b) => a.strike - b.strike);

  if (!rows.length) {
    body.innerHTML = `<tr><td colspan="11" class="py-10 text-center text-slate-600 text-sm">
      ${d.loading ? 'Loading option chain...' : d.error ? d.error : 'No data available. Start live data to fetch.'}</td></tr>`;
    return;
  }

  body.innerHTML = rows.map(r => {
    const strike = r.strike;
    const c = r.call || {};
    const p = r.put || {};
    const callITM = spot > strike;
    const putITM = strike > spot;
    const isATM = rows.length > 1 && Math.abs(strike - spot) === Math.min(...rows.map(x => Math.abs(x.strike - spot)));
    const isCustom = r.custom;

    const callBg = callITM ? 'bg-emerald-950/30' : '';
    const putBg  = putITM  ? 'bg-rose-950/30'    : '';
    const atmBorder = isATM ? 'border-y-2 border-indigo-500/40' : 'border-b border-slate-800/60';

    const badge = (itm, col) => `<span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-semibold ${
      itm ? `bg-${col}-500/20 text-${col}-300` : 'bg-slate-800 text-slate-600'}">${itm?'ITM':'OTM'}</span>`;

    return `<tr class="${atmBorder} hover:bg-slate-800/40 transition-colors">
      <td class="py-2 px-2 ${callBg}">${badge(callITM,'emerald')}</td>
      <td class="py-2 px-2 text-right tabular-nums text-xs ${callBg} ${callITM?'text-slate-400':'text-slate-600'}">${fmtOI(c.oi)}</td>
      <td class="py-2 px-2 text-right tabular-nums text-xs ${callBg} text-slate-600">${Number(c.iv||0).toFixed(1)}</td>
      <td class="py-2 px-2 text-right tabular-nums text-xs ${callBg} text-slate-600">${fmt(c.bid||0)}/${fmt(c.ask||0)}</td>
      <td class="py-2 px-2 text-right tabular-nums font-semibold ${callBg} ${callITM?'text-emerald-400':'text-slate-400'}">${fmt(c.ltp)}</td>
      <td class="py-2 px-2 text-center font-bold tabular-nums bg-slate-950/60 border-x border-slate-700/50 ${isATM?'text-indigo-400':'text-slate-300'}">
        ${strike}${isCustom?'<span class="text-indigo-400 text-[9px] align-super ml-0.5">+</span>':''}${isATM?'<span class="text-[9px] text-indigo-500 block leading-none">ATM</span>':''}
      </td>
      <td class="py-2 px-2 text-left tabular-nums font-semibold ${putBg} ${putITM?'text-rose-400':'text-slate-400'}">${fmt(p.ltp)}</td>
      <td class="py-2 px-2 text-left tabular-nums text-xs ${putBg} text-slate-600">${fmt(p.bid||0)}/${fmt(p.ask||0)}</td>
      <td class="py-2 px-2 text-left tabular-nums text-xs ${putBg} text-slate-600">${Number(p.iv||0).toFixed(1)}</td>
      <td class="py-2 px-2 text-left tabular-nums text-xs ${putBg} ${putITM?'text-slate-400':'text-slate-600'}">${fmtOI(p.oi)}</td>
      <td class="py-2 px-2 text-right ${putBg}">${badge(putITM,'rose')}</td>
    </tr>`;
  }).join('');
}

// ========================= EXPIRY / CUSTOM STRIKES =========================
function changeExpiry() {
  const exp = document.getElementById('expirySelect').value;
  if (!exp || !selectedSymbol) return;
  const entry = watchlist.get(selectedSymbol);
  if (entry) entry.expiry = exp;
  if (connected || IS_REMOTE) fetchChain(selectedSymbol, exp);
}

function addCustomStrike() {
  const input = document.getElementById('customStrikeInput');
  const val = parseFloat(input.value);
  if (!isNaN(val) && val > 0 && !customStrikes.includes(val)) {
    customStrikes.push(val);
    renderDetail();
  }
  input.value = '';
}
document.getElementById('customStrikeInput')?.addEventListener('keydown', e => { if (e.key==='Enter') addCustomStrike(); });

function resetCustomStrikes() {
  customStrikes = [];
  renderDetail();
}

// ========================= CHIP HIGHLIGHTING =========================
function highlightChip(sym) {
  document.querySelectorAll('.qchip').forEach(btn => {
    if (btn.textContent.trim() === sym) {
      btn.classList.remove('bg-slate-800','text-slate-400','border-slate-700');
      btn.classList.add('bg-indigo-600/20','border-indigo-500/50','text-indigo-400');
    }
  });
}
function unhighlightChip(sym) {
  document.querySelectorAll('.qchip').forEach(btn => {
    if (btn.textContent.trim() === sym) {
      btn.classList.remove('bg-indigo-600/20','border-indigo-500/50','text-indigo-400');
      btn.classList.add('bg-slate-800','text-slate-400','border-slate-700');
    }
  });
}

// ========================= SEARCH INPUT =========================
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addWatchlistItem();
});

// ========================= INIT =========================
renderCards();
if (IS_REMOTE) {
  connected = true;
  setConnStatus('live');
}
</script>
</body>
</html>
